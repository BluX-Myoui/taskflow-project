<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestor de Tareas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="brand-row">
                    <h1><i class="fa-solid fa-layer-group"></i> TaskFlow</h1>
                    <button id="btn-theme" class="btn-icon" aria-label="Alternar modo oscuro">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <p>Tu gestor de tareas eficiente</p>
            </header>

            <div class="search-box">
                <label for="buscador">Buscar Tarea</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="search" id="buscador" placeholder="Palabra clave o #ID...">
                </div>
            </div>

            <div class="stats-container" id="filters">
                <section class="stat-card stat-total" data-filter="all" id="filter-all">
                    <h3>Total</h3>
                    <span id="stat-total">0</span>
                </section>
                <section class="stat-card stat-pending" data-filter="pending" id="filter-pending">
                    <h3>Pendientes</h3>
                    <span id="stat-pending">0</span>
                </section>
                <section class="stat-card stat-completed" data-filter="completed" id="filter-completed">
                    <h3>Completadas</h3>
                    <span id="stat-completed">0</span>
                </section>
            </div>

            <form id="form-tarea" class="task-form">
                <label for="nueva-tarea">Agregar Nueva Tarea</label>
                <input type="text" id="nueva-tarea" required placeholder="Ej: Comprar pan...">
                <label for="nueva-prioridad">Prioridad</label>
                <select id="nueva-prioridad">
                    <option value="high">Alta</option>
                    <option value="medium" selected>Media</option>
                    <option value="low">Baja</option>
                </select>
                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-plus"></i> AGREGAR
                </button>
            </form>
        </aside>

        <main class="main-content">
            <div class="main-header">
                <h2>Lista de Tareas</h2>
                <div class="bulk-actions">
                    <button id="btn-ordenar-az" class="btn-secondary" aria-label="Ordenar de la A a la Z">
                        <i class="fa-solid fa-arrow-down-a-z"></i> A-Z
                    </button>
                    <button id="btn-marcar-todas" class="btn-secondary" aria-label="Marcar todas">
                        <i class="fa-solid fa-check-double"></i> Todas
                    </button>
                    <button id="btn-deshacer" class="btn-secondary" aria-label="Deshacer último borrado" disabled>
                        <i class="fa-solid fa-rotate-left"></i> Deshacer
                    </button>
                    <button id="btn-borrar-completadas" class="btn-danger" aria-label="Borrar completadas">
                        <i class="fa-solid fa-trash-can"></i> Limpiar
                    </button>
                </div>
            </div>
            <div class="priority-filters" id="priority-filters">
                <button class="chip active" data-priority="all">Todas</button>
                <button class="chip chip-high" data-priority="high">Alta</button>
                <button class="chip chip-medium" data-priority="medium">Media</button>
                <button class="chip chip-low" data-priority="low">Baja</button>
            </div>

            <ul id="lista-tareas" class="task-list">
                </ul>
        </main>
    </div>

    <template id="tarea-template">
        <li class="task-item">
            <div class="task-info">
                <input type="checkbox" class="task-checkbox" aria-label="Completar tarea">
                <div class="task-text">
                    <span class="task-id">#ID</span>
                    <span class="task-title">Título de la tarea</span>
                    <span class="task-priority">Media</span>
                </div>
            </div>
            <div class="task-actions">
                <button class="btn-editar" aria-label="Editar tarea">
                    <i class="fa-solid fa-pen"></i>
                </button>
                <button class="btn-borrar" aria-label="Borrar tarea">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </li>
    </template>

    <script src="app.js"></script>
</body>
</html>
